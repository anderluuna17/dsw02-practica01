openapi: 3.0.3
info:
  title: API Departamentos y Relacion con Empleados
  version: 1.0.0
  description: Contrato para CRUD de departamentos y asignacion/listado de empleados por departamento.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
paths:
  /api/v1/departamentos:
    post:
      summary: Crear departamento
      operationId: crearDepartamento
      tags: [Departamentos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartamentoCreateRequest'
      responses:
        '201':
          description: Departamento creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoResponse'
        '400':
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
    get:
      summary: Listar departamentos
      operationId: listarDepartamentos
      tags: [Departamentos]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 5
      responses:
        '200':
          description: Lista paginada de departamentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoPageResponse'
        '401':
          description: No autenticado

  /api/v1/departamentos/{clave}:
    get:
      summary: Obtener departamento por clave
      operationId: obtenerDepartamentoPorClave
      tags: [Departamentos]
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: '^DEP-[0-9]{4}$'
      responses:
        '200':
          description: Departamento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoResponse'
        '401':
          description: No autenticado
        '404':
          description: Departamento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Actualizar departamento
      operationId: actualizarDepartamento
      tags: [Departamentos]
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: '^DEP-[0-9]{4}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartamentoUpdateRequest'
      responses:
        '200':
          description: Departamento actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoResponse'
        '400':
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
        '404':
          description: Departamento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar departamento
      operationId: eliminarDepartamento
      tags: [Departamentos]
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: '^DEP-[0-9]{4}$'
      responses:
        '204':
          description: Departamento eliminado
        '401':
          description: No autenticado
        '404':
          description: Departamento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Departamento con empleados asociados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/departamentos/{clave}/empleados:
    get:
      summary: Listar empleados de un departamento
      operationId: listarEmpleadosPorDepartamento
      tags: [Departamentos]
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: '^DEP-[0-9]{4}$'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 5
      responses:
        '200':
          description: Lista paginada de empleados del departamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoPageResponse'
        '401':
          description: No autenticado
        '404':
          description: Departamento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/empleados/{clave}/departamento:
    patch:
      summary: Asignar o cambiar departamento de empleado
      operationId: asignarDepartamentoEmpleado
      tags: [Empleados]
      parameters:
        - name: clave
          in: path
          required: true
          schema:
            type: string
            pattern: '^EMP-[0-9]+$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoDepartamentoRequest'
      responses:
        '200':
          description: Empleado actualizado con nuevo departamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
        '404':
          description: Empleado o departamento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    DepartamentoCreateRequest:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 100
          example: Sistemas

    DepartamentoUpdateRequest:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 100
          example: Tecnologia

    DepartamentoResponse:
      type: object
      required: [clave, nombre]
      properties:
        clave:
          type: string
          pattern: '^DEP-[0-9]{4}$'
          example: DEP-1001
        nombre:
          type: string
          minLength: 2
          maxLength: 100
          example: Sistemas

    DepartamentoPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DepartamentoResponse'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          example: 5
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    EmpleadoDepartamentoRequest:
      type: object
      required: [departamentoClave]
      properties:
        departamentoClave:
          type: string
          pattern: '^DEP-[0-9]{4}$'
          example: DEP-1001

    EmpleadoResponse:
      type: object
      required: [clave, nombre, departamentoClave]
      properties:
        clave:
          type: string
          pattern: '^EMP-[0-9]+$'
          example: EMP-1001
        nombre:
          type: string
          maxLength: 100
          example: Juan Perez
        departamentoClave:
          type: string
          pattern: '^DEP-[0-9]{4}$'
          example: DEP-1001

    EmpleadoPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EmpleadoResponse'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          example: 5
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDACION, NO_ENCONTRADO, CONFLICTO, NO_AUTORIZADO]
        message:
          type: string
        details:
          type: array
          items:
            type: string
