openapi: 3.0.3
info:
  title: API Autenticacion Empleados
  version: 1.0.0
  description: Contrato para autenticacion de empleados por correo y contrasena usando HTTP Basic. El correo se expone solo en auth/me.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
paths:
  /api/v1/empleados/auth/me:
    get:
      summary: Obtener perfil autenticado
      description: Devuelve el perfil del empleado autenticado a partir de credenciales HTTP Basic (correo/contrasena).
      operationId: obtenerPerfilAutenticado
      tags: [Autenticacion]
      responses:
        '200':
          description: Perfil autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoAuthProfileResponse'
        '401':
          description: Credenciales invalidas o ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/empleados/{clave}/estado:
    patch:
      summary: Cambiar estado de cuenta de empleado
      description: Activa o inactiva una cuenta de empleado. En este feature, solo el usuario bootstrap `admin` esta autorizado para este endpoint.
      operationId: cambiarEstadoEmpleado
      tags: [Empleados]
      parameters:
        - name: clave
          in: path
          required: true
          description: Clave del empleado con formato EMP-<autonumerico>
          schema:
            type: string
            pattern: '^EMP-[0-9]+$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoEstadoRequest'
      responses:
        '200':
          description: Estado actualizado o sin cambios (idempotente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoEstadoResponse'
        '400':
          description: Datos de entrada invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Actor no autorizado para gestionar estado de cuenta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Empleado no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/empleados:
    get:
      summary: Listar empleados
      description: Endpoint de listado existente, mantiene paginacion con default size=5 y no expone el correo.
      operationId: listarEmpleados
      tags: [Empleados]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 5
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoPageResponse'
        '401':
          description: No autenticado
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    EmpleadoAuthProfileResponse:
      type: object
      required: [clave, correo, nombre, direccion, telefono, activo]
      properties:
        clave:
          type: string
          pattern: '^EMP-[0-9]+$'
          example: EMP-1001
        correo:
          type: string
          format: email
          example: empleado@empresa.com
        nombre:
          type: string
          maxLength: 100
          example: Ana Perez
        direccion:
          type: string
          maxLength: 100
          example: Calle Centro 123
        telefono:
          type: string
          maxLength: 100
          example: 5551234567
        activo:
          type: boolean
          example: true
    EmpleadoResponse:
      type: object
      required: [clave, nombre, direccion, telefono]
      properties:
        clave:
          type: string
          pattern: '^EMP-[0-9]+$'
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100

    EmpleadoEstadoRequest:
      type: object
      required: [activo]
      properties:
        activo:
          type: boolean
          description: Estado destino de la cuenta del empleado
          example: false

    EmpleadoEstadoResponse:
      type: object
      required: [clave, activo]
      properties:
        clave:
          type: string
          pattern: '^EMP-[0-9]+$'
          example: EMP-1001
        activo:
          type: boolean
          example: true

    EmpleadoPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EmpleadoResponse'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          example: 5
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [AUTH_INVALIDA, VALIDACION, CUENTA_INACTIVA, NO_AUTORIZADO, NO_ENCONTRADO]
        message:
          type: string
          example: Credenciales invalidas
        details:
          type: array
          items:
            type: string