openapi: 3.0.3
info:
  title: API Autenticacion y Listados Administrativos
  version: 1.1.0
  description: >-
    Contrato para perfil autenticado por actor (ADMIN/EMPLEADO) y para
    gobernanza de listados administrativos versionados en /api/v1 con
    paginacion page/size y default size=5.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
paths:
  /api/v1/empleados/auth/me:
    get:
      summary: Obtener perfil autenticado
      description: >-
        Devuelve el perfil del actor autenticado a partir de credenciales
        HTTP Basic. El actor puede ser ADMIN o EMPLEADO.
      operationId: obtenerPerfilAutenticado
      tags: [Autenticacion]
      responses:
        '200':
          description: Perfil autenticado por actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoAuthProfileResponse'
        '401':
          description: Credenciales invalidas o ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/empleados:
    get:
      summary: Listar empleados
      description: >-
        Listado paginado de empleados para actor ADMIN. Debe respetar
        versionado /api/v1 y default size=5.
      operationId: listarEmpleados
      tags: [Empleados]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de empleados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoPageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/departamentos:
    get:
      summary: Listar departamentos
      description: >-
        Listado paginado de departamentos para actor ADMIN. Debe respetar
        versionado /api/v1 y default size=5.
      operationId: listarDepartamentos
      tags: [Departamentos]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de departamentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoPageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/departamentos/{clave}/empleados:
    get:
      summary: Listar empleados por departamento
      description: >-
        Listado paginado de empleados filtrado por departamento para actor ADMIN.
        Debe respetar versionado /api/v1 y default size=5.
      operationId: listarEmpleadosPorDepartamento
      tags: [Departamentos]
      parameters:
        - name: clave
          in: path
          required: true
          description: Clave del departamento con formato DEP-<autonumerico>
          schema:
            type: string
            pattern: '^DEP-[0-9]+$'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Lista paginada de empleados del departamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoPageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Departamento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 5

  schemas:
    EmpleadoAuthProfileResponse:
      type: object
      required: [actorType, username, displayName, permissions]
      properties:
        actorType:
          type: string
          enum: [ADMIN, EMPLEADO]
          example: ADMIN
        username:
          type: string
          example: admin
        displayName:
          type: string
          example: Administrador
        permissions:
          type: array
          items:
            type: string
          example: [CRUD_EMPLEADOS, CRUD_DEPARTAMENTOS]
        empleado:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EmpleadoAuthEmpleadoResumen'

    EmpleadoAuthEmpleadoResumen:
      type: object
      required: [clave, correo, nombre, direccion, telefono, activo]
      properties:
        clave:
          type: string
          pattern: '^EMP-[0-9]+$'
          example: EMP-1001
        correo:
          type: string
          format: email
          example: empleado@empresa.com
        nombre:
          type: string
          maxLength: 100
          example: Ana Perez
        direccion:
          type: string
          maxLength: 100
          example: Calle Centro 123
        telefono:
          type: string
          maxLength: 100
          example: 5551234567
        departamentoClave:
          type: string
          nullable: true
          pattern: '^DEP-[0-9]+$'
          example: DEP-1001
        activo:
          type: boolean
          example: true

    EmpleadoResponse:
      type: object
      required: [clave, nombre, direccion, telefono, departamentoClave]
      properties:
        clave:
          type: string
          pattern: '^EMP-[0-9]+$'
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
        departamentoClave:
          type: string
          nullable: true
          pattern: '^DEP-[0-9]+$'

    DepartamentoResponse:
      type: object
      required: [clave, nombre]
      properties:
        clave:
          type: string
          pattern: '^DEP-[0-9]+$'
          example: DEP-1001
        nombre:
          type: string
          maxLength: 100
          example: Ventas

    EmpleadoPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EmpleadoResponse'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          default: 5
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    DepartamentoPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DepartamentoResponse'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          default: 5
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [AUTH_INVALIDA, VALIDACION, CUENTA_INACTIVA, NO_AUTORIZADO, NO_ENCONTRADO]
        message:
          type: string
          example: Credenciales invalidas
        details:
          type: array
          items:
            type: string
